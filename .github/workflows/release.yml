name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Publishes to NuGet using a stored API key (not OIDC), so only read access
# to the repo is required. No id-token needed.
permissions:
  contents: read

jobs:
  release:
    name: Build, Pack and Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM workloads
        run: dotnet workload install wasm-experimental wasm-tools

      - name: Install GitVersioning
        run: dotnet tool install --global nbgv

      - name: Set version
        id: version
        run: |
          # For tag runs, package version must match the tag (v2.0.4 -> 2.0.4).
          # For workflow_dispatch on non-tag refs, fall back to a stable computed version.
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
            nbgv set-version "$VERSION"
            echo "PublicRelease=true" >> "$GITHUB_ENV"
          else
            VERSION=$(nbgv get-version -v SimpleVersion)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Test Picea.Abies.Tests
        run: dotnet test --project Picea.Abies.Tests/Picea.Abies.Tests.csproj --no-build --verbosity normal

      - name: Test Picea.Abies.Server.Tests
        run: dotnet test --project Picea.Abies.Server.Tests/Picea.Abies.Server.Tests.csproj --no-build --verbosity normal

      - name: Test Picea.Abies.Server.Kestrel.Tests
        run: dotnet test --project Picea.Abies.Server.Kestrel.Tests/Picea.Abies.Server.Kestrel.Tests.csproj --no-build --verbosity normal

      - name: Test Picea.Abies.Conduit.Tests
        run: dotnet test --project Picea.Abies.Conduit.Tests/Picea.Abies.Conduit.Tests.csproj --no-build --verbosity normal

      - name: Test Picea.Abies.Conduit.Wasm.Tests
        run: dotnet test --project Picea.Abies.Conduit.Wasm.Tests/Picea.Abies.Conduit.Wasm.Tests.csproj --no-build --verbosity normal

      - name: Test Picea.Abies.Conduit.Api.Tests
        run: dotnet test --project Picea.Abies.Conduit.Api.Tests/Picea.Abies.Conduit.Api.Tests.csproj --no-build --verbosity normal

      - name: Test Picea.Abies.Analyzers.Tests
        run: dotnet test --project Picea.Abies.Analyzers.Tests/Picea.Abies.Analyzers.Tests.csproj --no-build --verbosity normal

      - name: Test Picea.Abies.Templates.Testing (build-smoke only)
        run: dotnet test --project Picea.Abies.Templates.Testing/Picea.Abies.Templates.Testing.csproj --no-build --verbosity normal -- --treenode-filter "/*/*/*/*[Category!=E2E]"

      - name: Pack Picea.Abies
        run: dotnet pack ./Picea.Abies/Picea.Abies.csproj --configuration Release --output ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack Picea.Abies.Browser
        run: dotnet pack ./Picea.Abies.Browser/Picea.Abies.Browser.csproj --configuration Release --output ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack Picea.Abies.Server
        run: dotnet pack ./Picea.Abies.Server/Picea.Abies.Server.csproj --configuration Release --output ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack Picea.Abies.Server.Kestrel
        run: dotnet pack ./Picea.Abies.Server.Kestrel/Picea.Abies.Server.Kestrel.csproj --configuration Release --output ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack Picea.Abies.Templates
        run: dotnet pack ./Picea.Abies.Templates/Picea.Abies.Templates.csproj --configuration Release --output ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack Abies (redirect metapackage)
        run: dotnet pack ./Metapackages/Abies/Abies.csproj --configuration Release --output ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack Abies.Browser (redirect metapackage)
        run: dotnet pack ./Metapackages/Abies.Browser/Abies.Browser.csproj --configuration Release --output ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Pack Abies.Server (redirect metapackage)
        run: dotnet pack ./Metapackages/Abies.Server/Abies.Server.csproj --configuration Release --output ./nupkg /p:Version=${{ steps.version.outputs.VERSION }}

      - name: Publish to NuGet
        if: startsWith(github.ref, 'refs/tags/v')
        run: dotnet nuget push ./nupkg/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
