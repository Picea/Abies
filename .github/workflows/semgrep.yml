name: Semgrep Security Scan

on:
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.squad/**'
      - '.github/instructions/**'
      - 'LICENSE'
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.squad/**'
      - '.github/instructions/**'
      - 'LICENSE'

permissions:
  contents: read

jobs:
  semgrep:
    name: Semgrep
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # returntocorp/semgrep-action is abandoned. Run the official Semgrep CLI
      # (pip install) directly. `semgrep scan` keeps behavior equivalent and
      # emits SARIF for upload. --error is intentionally omitted so SARIF is
      # always produced; findings surface in the Security tab via the SARIF.
      - name: Install Semgrep CLI
        run: python3 -m pip install --user semgrep

      - name: Run Semgrep rules
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          semgrep scan \
            --config .semgrep/rules/conduit-security.yml \
            --config .semgrep/rules/template-security.yml \
            --sarif --output semgrep.sarif

      - name: Upload SARIF results
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
