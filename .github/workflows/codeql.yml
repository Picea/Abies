name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    # Schedule runs always skip this check and proceed to analysis
    if: github.event_name != 'schedule'
    outputs:
      docs_only: ${{ steps.check.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for non-docs changes
        id: check
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          else
            CHANGED=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || git diff --name-only HEAD~1 HEAD)
          fi
          NON_DOCS=$(echo "$CHANGED" | grep -vE '^(docs/|\.squad/|\.github/instructions/|README|CHANGELOG|CONTRIBUTING|SECURITY|LICENSE|BENCHMARK_PR_STATUS|.*\.md$)' | grep -v '^$' || true)
          if [ -z "$NON_DOCS" ]; then
            echo "docs_only=true" >> $GITHUB_OUTPUT
            echo "📚 Docs-only change — skipping CodeQL analysis"
          else
            echo "docs_only=false" >> $GITHUB_OUTPUT
            echo "🔨 Code changes detected — running CodeQL analysis"
          fi

  analyze:
    name: Analyze C# Code
    needs: [detect-changes]
    # Run when: code changed on push/PR, OR the weekly schedule triggered
    if: |
      always() && (
        github.event_name == 'schedule' ||
        needs.detect-changes.result == 'skipped' ||
        needs.detect-changes.outputs.docs_only == 'false'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        # Use security-and-quality for comprehensive coverage
        # Options: security-extended, security-and-quality
        queries: security-and-quality
        # For C#: No build required with .NET 9+
        build-mode: none

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
        # Upload results even if there are findings
        upload: always
