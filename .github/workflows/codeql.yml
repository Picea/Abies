name: "CodeQL Security Analysis"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    # Run weekly on Monday at 9 AM UTC
    - cron: '0 9 * * 1'

# Default read-only; the analyze job widens to security-events: write
# for uploading CodeQL results.
permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.check.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if docs-only change
        id: check
        # Pass context values via env (never interpolate into the script body)
        # to avoid shell/script injection via branch names or refs.
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          # Scheduled runs always include code — treat as non-docs-only
          if [ "$EVENT_NAME" = "schedule" ]; then
            echo "docs_only=false" >> $GITHUB_OUTPUT
            echo "📅 Scheduled run — treating as non-docs-only"
            exit 0
          fi

          # Determine changed files based on event type
          if [ "$EVENT_NAME" = "pull_request" ]; then
            CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          else
            BEFORE="$BEFORE_SHA"
            if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ]; then
              CHANGED=$(git diff --name-only "$BEFORE".."$AFTER_SHA" 2>/dev/null || echo "")
            else
              CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            fi
          fi

          echo "Changed files:"
          echo "$CHANGED"

          # Check if any file is NOT docs-only
          NON_DOCS=$(echo "$CHANGED" | grep -vE '^(\.squad/|docs/|\.github/instructions/|.*\.md$|LICENSE$)' | grep -v '^$' || true)

          if [ -z "$NON_DOCS" ] && [ -n "$CHANGED" ]; then
            echo "docs_only=true" >> $GITHUB_OUTPUT
            echo "✅ Docs-only change detected — skipping expensive jobs"
          else
            echo "docs_only=false" >> $GITHUB_OUTPUT
            echo "🔧 Code changes detected — running all jobs"
          fi

  analyze-skipped:
    name: Analyze C# Code
    needs: [detect-changes]
    if: needs.detect-changes.outputs.docs_only == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Skip CodeQL — docs-only change
        run: echo "✅ Docs-only change — CodeQL analysis skipped"

  analyze:
    name: Analyze C# Code
    needs: [detect-changes]
    if: needs.detect-changes.outputs.docs_only == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'csharp' ]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        # Use security-and-quality for comprehensive coverage
        # Options: security-extended, security-and-quality
        queries: security-and-quality
        # For C#: No build required with .NET 9+
        build-mode: none

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
        # Upload results even if there are findings
        upload: always
