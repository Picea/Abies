name: E2E

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check if E2E project is in solution
        id: check-e2e
        run: |
          # The E2E project was temporarily removed from the solution
          # because its Aspire AppHost reference is broken.
          # Skip gracefully if it's not in the solution.
          # Use grep instead of `dotnet sln list` to avoid requiring
          # the .NET SDK before the setup-dotnet step.
          if grep -q 'Picea.Abies.Conduit.Testing.E2E' Picea.Abies.sln; then
            echo "in_solution=true" >> $GITHUB_OUTPUT
            echo "✅ E2E project found in solution"
          else
            echo "in_solution=false" >> $GITHUB_OUTPUT
            echo "⚠️  E2E project not in solution — skipping E2E tests"
            echo "The Conduit E2E project was temporarily removed from the solution."
            echo "To re-enable: fix AppHost references and run 'dotnet sln add Picea.Abies.Conduit.Testing.E2E'"
          fi

      - name: Setup .NET 10
        if: steps.check-e2e.outputs.in_solution == 'true'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install WASM workloads
        if: steps.check-e2e.outputs.in_solution == 'true'
        run: dotnet workload install wasm-experimental wasm-tools

      - name: Restore
        if: steps.check-e2e.outputs.in_solution == 'true'
        run: dotnet restore

      - name: Build
        if: steps.check-e2e.outputs.in_solution == 'true'
        run: dotnet build --no-restore -c Debug
      
      - name: Cache Playwright browsers
        if: steps.check-e2e.outputs.in_solution == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/packages.lock.json') }}
          restore-keys: |
            ms-playwright-${{ runner.os }}-

      # Install Playwright browsers for .NET (must run AFTER build)
      # See: https://playwright.dev/dotnet/docs/ci-intro
      - name: Install Playwright browsers
        if: steps.check-e2e.outputs.in_solution == 'true'
        run: pwsh bin/Debug/net10.0/playwright.ps1 install --with-deps
        working-directory: Picea.Abies.Conduit.Testing.E2E

      - name: Run E2E tests (sequential)
        if: steps.check-e2e.outputs.in_solution == 'true'
        id: e2e-tests
        continue-on-error: true
        run: |
          dotnet test --project Picea.Abies.Conduit.Testing.E2E/Picea.Abies.Conduit.Testing.E2E.csproj \
            --no-build -c Debug \
            -- --treenode-filter "/*/*/*/*[Category!=Performance]" \
            --report-trx --report-trx-filename conduit-e2e.trx \
            --maximum-parallel-tests 1 --timeout 3600000
      
      - name: Analyze test results
        if: always() && steps.check-e2e.outputs.in_solution == 'true'
        id: analyze-results
        run: |
          python3 scripts/analyze_e2e_results.py \
            Picea.Abies.Conduit.Testing.E2E/TestResults/conduit-e2e.trx

      - name: Upload test results
        if: always() && steps.check-e2e.outputs.in_solution == 'true'
        uses: actions/upload-artifact@v6
        with:
          name: e2e-test-results
          path: |
            **/TestResults/*.trx
            Picea.Abies.Conduit.Testing.E2E/bin/**/.playwright/**

      - name: E2E skipped summary
        if: steps.check-e2e.outputs.in_solution == 'false'
        run: |
          echo "::warning::E2E tests skipped — Picea.Abies.Conduit.Testing.E2E is not in the solution. Fix AppHost references to re-enable."
