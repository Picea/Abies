# ZAP full (active) scan policy for Conduit API — nightly schedule only.
# Format: <alert-id>\t<IGNORE|WARN|FAIL>\t<url-regex>
#
# This is intentionally more aggressive than the baseline policy.
# The active scanner will probe for injection, auth bypass, and common
# web vulnerabilities. Treat any FAIL-level finding as a blocking issue.

# Missing anti-CSRF tokens — Conduit uses token-based auth (JWT), not cookie forms.
10202	IGNORE	.*

# Timestamp disclosure — informational; not actionable in an API context.
10096	WARN	.*

# X-Content-Type-Options not set — document but not blocking for an API.
10021	WARN	.*

# Information disclosure: suspicious comments / debug info — WARN to catch leakage.
10027	WARN	.*

# All injection categories (SQLi, XSS, path traversal, SSTI) → fail build.
# Alert IDs 40xxx = active scan injection rules; enforced by default FAIL behaviour.

# Remote OS Command Injection (40028) — must fail.
40028	FAIL	.*

# Remote File Inclusion (7) — must fail.
7	FAIL	.*

# Path Traversal (6) — must fail.
6	FAIL	.*

# SQL Injection (40018 / 40019 / 40020 / 40021 / 40022) — must fail.
40018	FAIL	.*
40019	FAIL	.*
40020	FAIL	.*
40021	FAIL	.*
40022	FAIL	.*

# XSS – Reflected (40012) and Persistent (40014) — must fail.
40012	FAIL	.*
40014	FAIL	.*

# Server-Side Template Injection (90035) — must fail.
90035	FAIL	.*

# External Redirect (20019) — must fail.
20019	FAIL	.*

# Parameter Tampering (40008) — must fail.
40008	FAIL	.*

# ------------------------------------------------------------------ #
#  Frontend-specific rules (WASM host — HTML, headers, browser surface) #
# ------------------------------------------------------------------ #

# Content Security Policy (CSP) not set (10038) — WARN; SPA should define a policy.
10038	WARN	.*

# Anti-clickjacking (X-Frame-Options missing) (10020) — WARN; frontend must set this.
10020	WARN	.*

# Strict-Transport-Security (HSTS) (10035) — IGNORE in CI (HTTP only, no TLS).
10035	IGNORE	.*

# Cookie without SameSite attribute (10054) — WARN for session cookies on the frontend.
10054	WARN	.*

# Cookie without Secure flag (10011) — IGNORE in CI (HTTP only, no TLS).
10011	IGNORE	.*

# Permissions Policy / Feature-Policy not set (10063) — WARN; good practice for SPAs.
10063	WARN	.*
