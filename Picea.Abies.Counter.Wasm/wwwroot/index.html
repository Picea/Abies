<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Abies Counter</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            color: #eee;
        }
        .counter {
            text-align: center;
            padding: 2rem;
            background: #16213e;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        h1 {
            margin-bottom: 1.5rem;
            font-size: 1.8rem;
            color: #e94560;
        }
        .controls {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .count {
            font-size: 3rem;
            font-weight: bold;
            min-width: 4rem;
            color: #fff;
        }
        .btn {
            font-size: 1.5rem;
            width: 3rem;
            height: 3rem;
            border: none;
            border-radius: 50%;
            background: #e94560;
            color: #fff;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        .btn:hover {
            background: #c73e54;
            transform: scale(1.1);
        }
        .btn:active {
            transform: scale(0.95);
        }
        .reset {
            padding: 0.5rem 1.5rem;
            font-size: 1rem;
            border: 2px solid #e94560;
            border-radius: 8px;
            background: transparent;
            color: #e94560;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }
        .reset:hover {
            background: #e94560;
            color: #fff;
        }
        #loading {
            color: #666;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <!-- Abies renders directly into document.body via abies.js OP_ADD_ROOT. -->
    <p id="loading">Loading Abies Counter…</p>

    <!-- .NET WASM bootstrap — main.js imports dotnet.js and calls dotnet.run() -->
    <script type="module" src="./main.js"></script>
</body>
</html>
